services:
  postgres:
    image: postgres:16-alpine
    container_name: bidex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidex
      POSTGRES_USER: bidex
      POSTGRES_PASSWORD: bidex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidex -d bidex"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
